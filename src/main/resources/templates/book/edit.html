<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
 
<head th:replace="~{common :: meta_header('書籍編集',~{::link},~{::script})}">
    <title th:text="${title} + ' | MTLibrary'">書籍編集 | MTLibrary</title>
    <link rel="stylesheet" th:href="@{/css/stock/edit.css}" />
    <script type="text/javascript" th:src="@{/js/stock/edit.js}"></script>
    <script type="text/javascript">
        window.addEventListener('DOMContentLoaded', function () {
            /*<![CDATA[*/
            let message = /*[[${message}]]*/ null;
            if (message !== null && message !== '') {
                alert(message);
            }
            /*]]>*/
        });
    </script>
</head>

<!-- ポップアップ表示 -->
<!-- warningMessage が存在する場合、JavaScript の alert でポップアップ -->

<!-- <div th:if="${warningMessage}">
    <script th:inline="javascript">
        alert([[${warningMessage}]]);
        //alert JavaScript における関数で、ユーザーにポップアップメッセージを表示するために使うもの
        //{ エラーが出てるが文法的には大丈夫なので動作には問題なし
    </script>
</div> -->


<dialog>
     <form method="dialog">
          <p>ポップアップの表示例です</p>
          <button>閉じる</button>
     <form>
</dialog>


</body>
</html>

 
<body>
    <div class="contents">
        <div th:replace="~{common :: main_sidebar}"></div>
        <div class="main_contents">
            <div th:replace="~{common :: header}"></div>
            <div class="inner_contens">
                <div class="page_title">書籍編集</div>
                <div class="page_contents">
                    <div th:if="${message}" class="alert alert-warning">
                        <p th:text="${message}"></p>
                    </div>
 
                    <form id="book_register_form" th:object="${bookMstDto}" th:action="@{/book/edit}" method="post">
                        <p class="note">*は必須です</p>
 
                        <div class="right-align" style="margin-bottom: 10px;">
                            <a th:href="@{/book/index}" class="link">← 一覧へ戻る</a>
                        </div>
 
                        <input type="hidden" th:field="*{id}" />
 
                        <div class="form_group">
                            <label>書籍名<span class="mark">*</span></label>
                            <input type="text" th:field="*{title}" placeholder="書籍名を入力" />
                            <div class="error_msg" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                        </div>
 
                        <div class="form_group">
                            <label>ISBN<span class="mark">*</span></label>
                            <input type="text" th:field="*{isbn}" placeholder="ISBNを入力" />
                            <div class="error_msg" th:if="${#fields.hasErrors('isbn')}" th:errors="*{isbn}"></div>
                        </div>

                            <div class="btn_block">
                            <button type="submit" class="submit_btn">変更</button>
                            <div th:if="${warningMessage}">
                                <script th:inline="javascript">
                                </script>
                            </div>
                        </div>
                      

                        <!-- 警告メッセージがあれば表示 -->
                        <div th:if="${warningMessage}" class="alert alert-warning">
                        <p th:text="${warningMessage}"></p>
                        </div>

                    </form>
 
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{common :: footer}"></div>
</body>
